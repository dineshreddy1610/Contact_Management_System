<!DOCTYPE html>
<html>

<head>
<title>Contact Dashboard</title>
<link rel="stylesheet" href="dashboard.css">
</head>

<body>

<!-- Navbar -->

<nav class="navbar">

<div class="logo">Contact Manager</div>

<div class="nav-right">

<input type="text" id="searchInput" placeholder="Search contact">

<button id="darkModeBtn">🌙</button>

<button onclick="logout()">Logout</button>

</div>

</nav>


<!-- Welcome Section -->

<div class="welcome">

<h2 id="welcomeUser">Welcome</h2>
<p>Manage your contacts easily</p>

</div>

</div>

<div class="stats">

<div class="card">

<h3>Total Contacts</h3>
<p id="contactCount">0</p>

</div>

</div>

</div>


<!-- Dashboard -->

<div class="dashboard">

<!-- Add Contact -->

<div class="form-section">

<h3>Add Contact</h3>

<form id="contactForm">

<input type="text" id="contactName" placeholder="Name" required>

<input type="email" id="contactEmail" placeholder="Email" required>

<input type="text" id="contactPhone" placeholder="Phone Number" required>

<select id="contactGender" required>

<option value="">Select Gender</option>
<option value="male">Male</option>
<option value="female">Female</option>

</select>

<button type="submit">Add Contact</button>

</form>

</div>


<!-- Contact Table -->

<div class="table-section">

<h3>Your Contacts</h3>

<table>

<thead>

<tr>

<th>Avatar</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="contactList"></tbody>

</table>

</div>

</div>

<script src="dashboard.js"></script>

</body>

</html>
